<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FarmScore — Login</title>
<style>
  :root {
    --forest: #1B4332; --leaf: #2D6A4F; --moss: #52B788;
    --moss-lt: #D8F3DC; --cream: #F8F4EC; --white: #FFFFFF;
    --charcoal: #2D3436; --muted: #6B7280; --border: #E5E7EB;
    --red: #B91C1C; --red-lt: #FEE2E2; --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--cream); color: var(--charcoal);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  nav {
    background: var(--forest); padding: 0 2rem;
    display: flex; align-items: center; height: 60px;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 1.25rem; font-weight: 700; color: var(--white); text-decoration: none; }
  .nav-brand span { color: var(--moss); }

  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 2.5rem;
    width: 100%; max-width: 420px;
  }
  .card-header { text-align: center; margin-bottom: 2rem; }
  .card-header .emoji { font-size: 2.5rem; }
  .card-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--forest); margin-top: 8px; }
  .card-header p  { font-size: 0.875rem; color: var(--muted); margin-top: 4px; }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  .field label { font-size: 0.82rem; font-weight: 600; color: var(--charcoal); }
  .field input {
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.9rem; color: var(--charcoal);
    outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--moss); box-shadow: 0 0 0 3px rgba(82,183,136,0.15); }

  .btn-primary {
    width: 100%; background: var(--forest); color: var(--white);
    border: none; padding: 13px; border-radius: 8px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: background 0.2s; margin-top: 0.5rem;
  }
  .btn-primary:hover { background: var(--leaf); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-box {
    background: var(--red-lt); color: var(--red);
    border-radius: 8px; padding: 10px 14px;
    font-size: 0.85rem; margin-bottom: 1rem; display: none;
  }
  .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
  .footer-link a { color: var(--forest); font-weight: 600; text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">🌱 Farm<span>Score</span></a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="emoji">🔐</div>
      <h1>Welcome back</h1>
      <p>Sign in to your FarmScore account</p>
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn-primary" id="login-btn" onclick="login()">Sign in</button>

    <div class="footer-link">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

// Redirect if already logged in
const existing = localStorage.getItem('fs_token');
if (existing) {
  const user = JSON.parse(localStorage.getItem('fs_user') || '{}');
  window.location.href = user.role === 'admin' ? 'lender/index.html' : 'index.html';
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('error-box');
  const btn      = document.getElementById('login-btn');

  errBox.style.display = 'none';
  if (!email || !password) { showError('Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res  = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const json = await res.json();
    if (!res.ok) { showError(json.error); return; }

    localStorage.setItem('fs_token', json.token);
    localStorage.setItem('fs_user',  JSON.stringify(json.user));

    window.location.href = json.user.role === 'admin' ? 'lender/index.html' : 'index.html';
  } catch {
    showError('Could not reach the server. Is the backend running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function showError(msg) {
  const b = document.getElementById('error-box');
  b.textContent = msg;
  b.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
